name: Neurosting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Nastavení Pythonu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Instalace balíčků
      run: |
        pip install -r Requirements
    
    - name: Kontrola souborů
      run: |
        ls -la
        python --version
    
    - name: Spuštění NeuroStringu
      run: |
        timeout 10s python main.py
        status=$?
        if [ "$status" -eq 124 ]; then
          echo "✅ Test proběhl (skript byl ukončen po 10s timeoutu, což je očekávané chování)"
        elif [ "$status" -ne 0 ]; then
          echo "❌ Test selhal s návratovým kódem $status"
          exit "$status"
        else
          echo "✅ Test proběhl úspěšně"
        fi
